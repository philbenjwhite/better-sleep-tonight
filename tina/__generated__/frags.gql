fragment StepTypesParts on StepTypes {
  __typename
  slug
  displayName
  description
  icon
  requiresUserInput
  hasAvatarResponse
}

fragment InputTypesParts on InputTypes {
  __typename
  slug
  displayName
  description
  allowsMultiple
  hasOptions
  validationPattern
}

fragment FlowsParts on Flows {
  __typename
  flowId
  displayName
  description
  isActive
  introVideo
  avatarIntroScript
  globalVariables {
    __typename
    avatarName
    brandName
    supportEmail
    customVar1
    customVar2
    conditionKeyword
  }
  steps {
    __typename
    stepId
    internalName
    order
    stepType
    headerContent {
      __typename
      headline
      subheadline
      secondarySubheadline
      audioNotice
      primaryButtonText
    }
    questionContent {
      __typename
      questionText
      inputType
      helperText
      isRequired
      answerOptions {
        __typename
        optionId
        label
        value
        order
        avatarResponse
        avatarEmotion
        nextStepOverride
        terminateFlow
        terminationMessage
        tags
      }
    }
    avatarContent {
      __typename
      scriptText
      secondaryScriptText
      tertiaryScriptText
      emotion
      gestureHint
      pauseAfterMs
      autoAdvance
      autoAdvanceDelayMs
    }
    emailCaptureContent {
      __typename
      promptText
      placeholderText
      submitButtonText
      avatarResponseOnSubmit
      avatarEmotionOnSubmit
      skipOptionText
      avatarResponseOnSkip
      avatarEmotionOnSkip
    }
    ctaContent {
      __typename
      headline
      bodyText
      primaryButtonText
      primaryButtonUrl
      secondaryButtonText
      secondaryButtonUrl
    }
    answerSummaryContent {
      __typename
      videoId
      introText
      outroText
      emotion
      empathyMessage
      empathyEmotion
      emailCTAMessage
      emailCTAEmotion
      summaryMappings
    }
    styling {
      __typename
      backgroundColor
      customCssClass
    }
    analytics {
      __typename
      trackingEventName
      customProperties
    }
  }
  metadata {
    __typename
    createdAt
    updatedAt
    author
    version
  }
}
